# StaffingBuddy — firm configs
#
# Two scrape modes per firm:
#
#   mode: api   -> we call the JSON endpoint the careers page calls behind the scenes
#                  (fast, stable, no browser). Find it in DevTools > Network > XHR.
#   mode: dom   -> Playwright renders the page, we read job cards via CSS selectors
#                  (works on anything, slower, breaks when they redesign).
#
# Each firm produces job dicts with: title, location, url, posted, firm
#
# Kforce below is a CONFIRMED-WORKING api example (Azure Search POST endpoint,
# discovered via DevTools > Network). The dom firms are STARTING POINTS whose
# search URLs + selectors still need calibrating against the live site — see
# README "Calibrating a firm".

firms:
  # ---------------------------------------------------------------- WORKING ----
  - name: "Kforce"
    mode: api
    search_url: "https://www.kforce.com/find-work/search-jobs/"
    api:
      method: POST
      url: "https://kforcewebeast.search.windows.net/indexes/kforcewebjobentity/docs/search?api-version=2016-09-01"
      headers:
        api-key: "1603E4DC4C87A8E41D6BBDE4EEA4EFB7"
        Content-Type: "application/json; charset=UTF-8"
        Accept: "application/json"
      json_body:
        count: true
        select: "Title, Id, PostDate, City, State, Zip, TypeCode, ApplyUrl, Industry"
        filter: ""
        queryType: "simple"
        search: "data"            # <- search term; broaden/narrow here
        searchFields: "Title, Responsibilities, Skills, City, State"
        searchMode: "any"
        skip: 0
        top: 50
      paginate:
        in: json_body
        param: skip
        size: 50
        max_pages: 3
      list_path: "value"
      url_prefix: "https://www.kforce.com"
      # ApplyUrl points at the apply flow; strip '/ApplyOnline...' -> job-description page
      url_regex_sub: { pattern: "/ApplyOnline.*$", repl: "/" }
      fields:
        title: "Title"
        location: ["City", "State"]
        url: "ApplyUrl"
        posted: "PostDate"
    location_filter: ["United States", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "TEKsystems"
    mode: api
    # CONFIRMED working (Phenom People refineSearch API). global:true + empty
    # locationData removes the 50mi geo-limit -> nationwide. Paginated via `from`.
    search_url: "https://careers.teksystems.com/us/en/search-results?keywords=data"
    api:
      method: POST
      url: "https://careers.teksystems.com/widgets"
      headers:
        Content-Type: "application/json"
        Accept: "application/json"
        User-Agent: "Mozilla/5.0 StaffingBuddy"
      json_body:
        lang: "en_us"
        deviceType: "desktop"
        country: "us"
        pageName: "search-results"
        ddoKey: "refineSearch"
        sortBy: "Most recent"
        from: 0
        jobs: true
        counts: true
        all_fields: ["category", "state", "city", "type"]
        size: 100
        clearAll: false
        jdsource: "facets"
        isSliderEnable: false
        pageId: "page10"
        siteType: "external"
        keywords: "data"
        global: true
        selected_fields: {}
        locationData: {}
      paginate:
        in: json_body
        param: from
        size: 100
        max_pages: 3
      list_path: "refineSearch.data.jobs"
      # applyUrl goes to apply.teksystems.com (apply flow). Build the JD page URL
      # from jobId + a hyphenated title slug instead.
      url_template: "https://careers.teksystems.com/us/en/job/{jobId}/{slug:title}"
      fields:
        title: "title"
        location: "cityState"
        url: "applyUrl"
        posted: "postedDate"
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "CyberCoders"
    mode: api
    enabled: false
    # API reachable (GET, Solr-backed) BUT keyword search is NOT replicable — the
    # ccv5-jobs/search endpoint ignores searchterms and returns all ~4,000 jobs
    # (keyword filtering happens via a server-side search session we don't hold).
    # CyberCoders is also multi-industry (tax/legal/medical), so the date-sorted
    # firehose yields very few data/ML roles. Low ROI — left here as a documented
    # dead-end. Revisit only if we replicate the search-session token.
    search_url: "https://www.cybercoders.com/search/?searchterms=data"
    api:
      method: GET
      url: "https://www.cybercoders.com/ccv5-jobs/search"
      headers:
        Accept: "application/json"
        User-Agent: "Mozilla/5.0 StaffingBuddy"
      params:
        searchterms: "data"
        rows: 50
        page: 1
        sortType: "posted"
        daysPosted: 0
        buid: 1
      list_path: "jobs"
      url_prefix: "https://www.cybercoders.com"
      fields:
        title: "jobTitle"
        location: ["City", "StateCode"]
        url: "JobURL"
        posted: "DatePost"
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "Insight Global"
    mode: html
    # Jobs are server-rendered (curl_cffi reads them) on the jobs.* subdomain.
    # The site paginates via ASP.NET POST (no GET param works), so instead we run
    # several search terms and merge — each term returns ~10 results.
    search_url: "https://jobs.insightglobal.com/find_a_job/?srch=data+engineer"
    url_prefix: "https://jobs.insightglobal.com"
    detail_date: true   # real Post Date is microdata on the detail page, not the listing
    urls:
      - "https://jobs.insightglobal.com/find_a_job/?srch=data+engineer"
      - "https://jobs.insightglobal.com/find_a_job/?srch=software+engineer"
      - "https://jobs.insightglobal.com/find_a_job/?srch=data+scientist"
      - "https://jobs.insightglobal.com/find_a_job/?srch=full+stack+developer"
      - "https://jobs.insightglobal.com/find_a_job/?srch=python+developer"
      - "https://jobs.insightglobal.com/find_a_job/?srch=data+analyst"
      - "https://jobs.insightglobal.com/find_a_job/?srch=devops+engineer"
      - "https://jobs.insightglobal.com/find_a_job/?srch=cloud+engineer"
      - "https://jobs.insightglobal.com/find_a_job/?srch=machine+learning"
    selectors:
      card: "div.result"
      title: ".job-title"
      location: ".job-info"
      link: "a[href*='/job-']"
    location_split: "|"     # job-info is "City, ST | Category | Perm | $..."
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

  # ---------------------------------- FREE sitemap bypass (Cloudflare-walled) ---
  # These sites block headless browsers, but serve their XML job sitemap to search
  # engines — so we read it directly. No browser, no Apify, no cost. Title is
  # derived from the URL slug; location/date are limited (sitemap only).
  # Apex Systems: LIVE & FREE via its Drupal search endpoint (found in the page's
  # ajaxTrustedUrl). curl_cffi bypasses Cloudflare; the server renders a job-table.
  # Empty query returns nothing, so we run several broad terms and merge/dedup.
  # (Its sitemap.xml is a dead 2021-24 cache — do NOT use it.)
  - name: "Apex Systems"
    mode: html
    search_url: "https://www.apexsystems.com/search-results-usa"
    url_prefix: "https://www.apexsystems.com"
    urls:
      - "https://www.apexsystems.com/search-results-usa?catalogcode=USA&radius=50&page=1&rows=100&remote=true&query=engineer"
      - "https://www.apexsystems.com/search-results-usa?catalogcode=USA&radius=50&page=1&rows=100&remote=true&query=developer"
      - "https://www.apexsystems.com/search-results-usa?catalogcode=USA&radius=50&page=1&rows=100&remote=true&query=data"
      - "https://www.apexsystems.com/search-results-usa?catalogcode=USA&radius=50&page=1&rows=100&remote=true&query=software"
    selectors:
      card: "table.job-table tr"
      title: "a.job-title-link"
      location: ["td:nth-of-type(2)", "td:nth-of-type(3)"]
      posted: "td:nth-of-type(4)"
      link: "a.job-title-link"
      require_link: true
    location_filter: []

  - name: "Robert Half"
    mode: sitemap
    search_url: "https://www.roberthalf.com/us/en/jobs"
    sitemap:
      url: "https://www.roberthalf.com/content/roberthalf.sitemap.us-external-job-details-sitemap.xml"
      job_match: "/job/"
      max: 4000
      max_age_days: 14     # the sitemap lags badly; keep only very recent entries
    # RH's sitemap lists many EXPIRED jobs (they redirect away from /job/). Verify
    # each is live and prune dead ones from the board.
    verify_live:
      must_contain: "/job/"
    location_filter: []

  # Vaco: SPA with a CSRF-protected search API (hard), but exposes a job sitemap.
  # The sitemap has no location/date, so detail_date enrichment backfills both, then
  # the US + recency (45d) filters run post-enrichment.
  - name: "Vaco"
    mode: sitemap
    search_url: "https://jobs.vaco.com/home"
    detail_date: true
    max_age_days: 45
    sitemap:
      url: "https://jobs.vaco.com/jobs-sitemap.xml"
      job_match: "/job/"
      ignore_lastmod: true   # sitemap stamps everything with today; use real datePosted
      max: 4000
    location_filter: []

  # Alldus: AI/ML & Data Engineering specialist (WordPress / Staffing-Future). The
  # job_listing sitemap enumerates every posting; detail pages carry JSON-LD
  # JobPosting with addressCountry/Locality + real datePosted. Sitemap lastmods are
  # all stamped "now", so ignore them and trust datePosted (old internal recruiter
  # reqs from 2023 get pruned by the 60-day default recency cap).
  - name: "Alldus"
    mode: sitemap
    search_url: "https://www.alldus.com/jobs/"
    detail_date: true
    sitemap:
      url: "https://alldus.com/job_listing-sitemap.xml"
      job_match: "/job/"
      ignore_lastmod: true
      max: 4000
    location_filter: []

  # CornerStone TTS (Technology Talent Services): woman-owned IT staffing (TX/NC/
  # SC/GA/FL/AZ). Top Echelon / Big Biller board — the search page is JS-rendered,
  # but rss/rss.smpl exposes every job with a clean title, link, and real pubDate.
  - name: "CornerStone TTS"
    mode: rss
    search_url: "https://jobs.cornerstonetechtalent.com/"
    max_age_days: 60
    rss:
      url: "https://jobs.cornerstonetechtalent.com/rss/rss.smpl"

  # Strategic Staffing Solutions (S3): national IT consulting/staffing (Detroit).
  # Board is WordPress (recruiterwp); the job sitemap enumerates every posting and
  # detail pages carry JSON-LD JobPosting (datePosted, addressLocality). detail_date
  # backfills date+location, then US + 60-day filters run (S3 has some intl roles).
  - name: "Strategic Staffing Solutions"
    mode: sitemap
    search_url: "https://jobs.strategicstaff.com/"
    detail_date: true
    sitemap:
      url: "https://jobs.strategicstaff.com/recruiterwp_job-sitemap.xml"
      job_match: "/jobs/"
      ignore_lastmod: true
      max: 4000
    location_filter: []

  # ProFocus Technology: Portland tech staffing (data/BI/AI/cloud/dev). WordPress
  # + EchoJobs plugin; the echojobs sitemap lists every posting. Detail pages have
  # no JSON-LD, so no date/location enrichment — title comes from the slug and
  # freshness from first_seen. Small board (~15) but all IT.
  - name: "ProFocus"
    mode: sitemap
    search_url: "https://www.profocustechnology.com/jobs"
    sitemap:
      url: "https://www.profocustechnology.com/echojobs-sitemap.xml"
      job_match: "/echojobs/"
      ignore_lastmod: true
      max: 4000
    location_filter: []

  # SolTech: Atlanta software/dev staffing. Old iCIMS portal is dead — jobs now on
  # a Tracker-RMS "Lite" portal that server-renders every job (title h3, location,
  # "Posted on DD Month YY" date, and a /Opportunity/LiteJob?...&id= link).
  - name: "SolTech"
    mode: html
    search_url: "https://evoportalus.tracker-rms.com/Opportunity/Lite/?db=Soltech"
    url: "https://evoportalus.tracker-rms.com/Opportunity/Lite/?db=Soltech"
    url_prefix: "https://evoportalus.tracker-rms.com"
    max_age_days: 60
    selectors:
      card: "div.fj_post"
      title: "h3"
      link: "a[href*='LiteJob']"
      location: "ul.featurej_post li"
      posted: "span.fw600"
      require_link: true
    location_filter: []

  # Talent Groups: Healthcare/IT staffing (Bullhorn-backed, Shazamme front-end).
  # The SPA fetches a public Shazamme JSON feed (list of {data:{...}}) with a
  # ready-made jobURL and ISO addedOnUTC date — wire it straight as api mode.
  - name: "Talent Groups"
    mode: api
    search_url: "https://www.talentgroups.com/jobs"
    max_age_days: 60
    api:
      url: "https://shazamme.io/job-results/08ee2cd8-7bbf-4fb2-b77a-14b746f4cb57"
      list_path: ""
      fields:
        title: "data.jobName"
        url: "data.jobURL"
        location: ["data.city", "data.state"]   # feed is 100% US
        posted: "data.addedOnUTC"
    location_filter: []

  # TRU Staffing Partners: cybersecurity/eDiscovery (Bullhorn career portal). The
  # SPA hits Bullhorn's PUBLIC REST JobBoardPost query API (no auth) — a reusable
  # pattern for ANY Bullhorn portal: find the firm's corpToken (72YPD) + swimlane
  # (rest30) in its network tab. id lives in the #fragment (which identity strips),
  # so we also stash it as ?jobid= to keep each job unique. Mostly legal roles; the
  # IT-title filter keeps the few software/AI ones.
  - name: "TRU Staffing Partners"
    mode: api
    search_url: "https://jobs.trustaffingpartners.com/"
    api:
      url: "https://public-rest30.bullhornstaffing.com/rest-services/72YPD/query/JobBoardPost"
      params:
        fields: "id,title,address(city,state),employmentType,dateLastPublished"
        where: "(isOpen=true AND isDeleted=false)"
        orderBy: "-dateLastPublished"
        count: "200"
      headers:
        Referer: "https://jobs.trustaffingpartners.com/"
      list_path: "data"
      url_template: "https://jobs.trustaffingpartners.com/?jobid={id}#/jobs/{id}"
      fields:
        title: "title"
        url: "id"
        location: ["address.city", "address.state"]
    location_filter: []

  # Stanton House: UK-based exec search with a US desk (cyber/IT/finance). Next.js
  # site backed by Google Cloud Talent Solution (_sf/api/v1/jobs/search.json POST).
  # address="United States" returns US-only; cursor pagination walks all pages via
  # the metadata.next_page_token fed back into job_search.page_token.
  - name: "Stanton House"
    mode: api
    search_url: "https://www.stantonhouse.com/jobs"
    api:
      url: "https://www.stantonhouse.com/_sf/api/v1/jobs/search.json"
      method: POST
      headers:
        Referer: "https://www.stantonhouse.com/us/jobs"
      json_body:
        job_search:
          query: ""
          location: {address: "United States", radius: 3000, region: "US", radius_units: "miles"}
          filters: {}
      paginate:
        mode: cursor
        token_path: "metadata.next_page_token"
        param: "job_search.page_token"
        in: "json_body"
        max_pages: 6
      list_path: "results"
      url_prefix: "https://www.stantonhouse.com/jobs"
      fields:
        title: "job.title"
        url: "job.url_slug"
        location: ["job.original_location"]
        posted: "job.published_at"
    location_filter: []

  # Mondo: national digital/tech/data staffing (Addison Group). The /jobs section
  # is a RecruitingHop widget that 403s plain HTTP and renders only in a browser —
  # so we use dom mode. /jobs/all-jobs lists every role as li.list-group-item with
  # an h2 title, a <strong> "City, ST, ZIP", and a /jobs/job/<slug>/<hash> link.
  - name: "Mondo"
    mode: dom
    search_url: "https://mondo.com/jobs/all-jobs"
    wait_until: domcontentloaded
    scroll_passes: 14
    selectors:
      card: "li.list-group-item"
      title: "h2"
      location: "strong"
      link: "a"
    location_filter: []

  # ============================================================ SMARTRECRUITERS ==
  # Generic adapter: SmartRecruiters public API. To add any SR firm, copy a block
  # and change the company id in BOTH the api.url and api.url_prefix. Find the id by
  # testing https://api.smartrecruiters.com/v1/companies/<Id>/postings?limit=1
  - name: "Collabera"
    mode: api
    search_url: "https://careers.smartrecruiters.com/Collabera2"
    api:
      method: GET
      url: "https://api.smartrecruiters.com/v1/companies/Collabera2/postings"
      headers: { Accept: "application/json", User-Agent: "Mozilla/5.0 StaffingBuddy" }
      params: { limit: 100, offset: 0 }
      paginate: { in: params, param: offset, size: 100, max_pages: 3 }
      list_path: "content"
      url_prefix: "https://jobs.smartrecruiters.com/Collabera2"
      fields:
        title: "name"
        location: ["location.city", "location.region"]
        url: "id"
        posted: "releasedDate"
    location_filter: ["United States", "USA", "US", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "Mastech Digital"
    mode: api
    search_url: "https://careers.smartrecruiters.com/MastechDigital"
    api:
      method: GET
      url: "https://api.smartrecruiters.com/v1/companies/MastechDigital/postings"
      headers: { Accept: "application/json", User-Agent: "Mozilla/5.0 StaffingBuddy" }
      params: { limit: 100, offset: 0 }
      list_path: "content"
      url_prefix: "https://jobs.smartrecruiters.com/MastechDigital"
      fields:
        title: "name"
        location: ["location.city", "location.region"]
        url: "id"
        posted: "releasedDate"
    location_filter: ["United States", "USA", "US", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "Synechron"
    mode: api
    search_url: "https://careers.smartrecruiters.com/Synechron"
    api:
      method: GET
      url: "https://api.smartrecruiters.com/v1/companies/Synechron/postings"
      headers: { Accept: "application/json", User-Agent: "Mozilla/5.0 StaffingBuddy" }
      params: { limit: 100, offset: 0 }
      list_path: "content"
      url_prefix: "https://jobs.smartrecruiters.com/Synechron"
      fields:
        title: "name"
        location: ["location.city", "location.region"]
        url: "id"
        posted: "releasedDate"
    location_filter: ["United States", "USA", "US", "OH", "Ohio", "Cincinnati", "Remote", ""]

  # Russell Tobin (Pride Global) — JobDiva candidate portal.
  - name: "Russell Tobin"
    mode: jobdiva
    search_url: "https://www.russelltobin.com/find-work/"
    jobdiva:
      a: "nyjdnw8rs3eurnjvdink7d2fl4mnyy0b22tjlzi328snknlo1pzpk0ue533mvm7r"
      compid: "2"
      pages: 3
    location_filter: []

  - name: "CRG"
    mode: html
    # Carolina Recruiting Group — Bullhorn career portal (Angular, server-rendered).
    # Listing has no location; detail_date enrichment backfills it from the detail page.
    search_url: "https://jobs.getcrg.com"
    url: "https://jobs.getcrg.com"
    url_prefix: "https://jobs.getcrg.com"
    detail_date: true
    selectors:
      card: "div.list-item"
      title: "a[href*='/jobs/']"
      link: "a[href*='/jobs/']"
      require_link: true
    location_filter: []

  # Motion Recruitment: national IT/software CONTRACT specialist (Bullhorn-backed).
  # /tech-jobs server-renders the newest ~20 jobs as <a> cards whose href encodes
  # city/type/title/id; the list paginates via a hidden JS API, but the newest-20
  # is exactly what a freshness board wants on a 3h cadence. detail_date backfills
  # the real datePosted (JSON-LD) from each job page; 60-day default cap prunes old.
  - name: "Motion Recruitment"
    mode: html
    search_url: "https://motionrecruitment.com/tech-jobs"
    url: "https://motionrecruitment.com/tech-jobs"
    url_prefix: "https://motionrecruitment.com"
    detail_date: true
    selectors:
      card: "a:has(h2[class*='JobItem_module_title'])"
      title: "h2[class*='JobItem_module_title']"
      location: "div[class*='jobDetailsSection'] p"
      require_link: true
    location_filter: []

  # KORE1: national IT staffing (software/cloud/DevOps/data/AI). Uses a SmartSearch
  # (smartsearchonline.com) board that server-renders every job as a list-group-item
  # with title, location, and a "Posted M/D/YYYY" date — no enrichment needed.
  - name: "KORE1"
    mode: html
    search_url: "https://search10.smartsearchonline.com/koreone/jobs/"
    url: "https://search10.smartsearchonline.com/koreone/jobs/"
    url_prefix: "https://search10.smartsearchonline.com/koreone/jobs/"
    max_age_days: 60
    selectors:
      card: "div.list-group-item"
      title: "a.coloredlink"
      link: "a.coloredlink"
      location: "div.thinrow"
      posted: "div.thinrow:nth-of-type(2)"
      require_link: true
    location_filter: []

  - name: "ASK Consulting"
    mode: html
    # Curately/ApostropheCMS — /jobs/list returns HTML cards; data is in
    # data-job-* attributes (read via @attr selectors).
    search_url: "https://careers.askconsulting.com/"
    http: { headers: { Referer: "https://careers.askconsulting.com/", Accept: "*/*" } }
    urls:
      - "https://careers.askconsulting.com/api/v1/jobs/list?pageCount=0&keyword=&aposLocale=en"
      - "https://careers.askconsulting.com/api/v1/jobs/list?pageCount=1&keyword=&aposLocale=en"
      - "https://careers.askconsulting.com/api/v1/jobs/list?pageCount=2&keyword=&aposLocale=en"
      - "https://careers.askconsulting.com/api/v1/jobs/list?pageCount=3&keyword=&aposLocale=en"
      - "https://careers.askconsulting.com/api/v1/jobs/list?pageCount=4&keyword=&aposLocale=en"
      - "https://careers.askconsulting.com/api/v1/jobs/list?pageCount=5&keyword=&aposLocale=en"
    selectors:
      card: "[data-job-id]"
      title: "@data-job-title"
      location: "@data-job-location"
      link: "@data-job-applylink"
      require_link: true
    location_filter: []

  - name: "Artech"
    mode: jobdiva
    search_url: "https://consultingjobs.artech.com/"
    jobdiva:
      a: "kvjdnwtsxgckrpsoozx5qc0oueybw1005779v7x6soig8eyqqmzaubfdl9tcx21s"
      compid: "0"
      portal: "https://www1.jobdiva.com/"
      pages: 3
    location_filter: []

  - name: "Mindlance"
    mode: jobdiva
    search_url: "https://mindlance.com/job-board/"
    jobdiva:
      a: "7fjdnw91pq69jlvngz1gp518iugamw00c66623tmx447r7e3lkr3gqqpqjhpy8mo"
      compid: "0"
      pages: 3
    location_filter: []

  - name: "Net2Source"
    mode: jobdiva
    search_url: "https://www.net2source.com/in-house-jobs"
    jobdiva:
      a: "fyjdnwkqny26xqof9rceu6y6gam6750308agqi8uui1cmk3v9j6duy26aoewnusi"
      compid: "0"
      pages: 3
    location_filter: []

  # =================================================== CEIPAL C2C VENDORS =======
  # Generic Ceipal adapter. To add a Ceipal firm: view-source its careers page,
  # find data-ceipal-api-key (apikey) and data-ceipal-career-portal-id (cp_id).
  - name: "Cynet Systems"
    mode: ceipal
    search_url: "https://www.cynetsystems.com/jobs"
    ceipal:
      apikey: "ZS9ZemN0eVplUjFrdGU3U3hHS2t5dz09"
