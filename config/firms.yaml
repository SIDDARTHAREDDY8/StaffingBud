      method: GET
      url: "https://api.agilityconnect.io/jobs/"
      headers: { Accept: "application/json", User-Agent: "Mozilla/5.0 StaffingBuddy" }
      params: { limit: 50, offset: 0 }
      paginate: { in: params, param: offset, size: 50, max_pages: 2 }
      list_path: "results"
      url_prefix: "https://agilityconnect.io/jobs"
      fields:
        title: "name"
        location: ["company.city", "company.state"]
        url: "id"
        posted: "posted_date"
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "Pinnacle Group"
    mode: api
    # Workday CXS API — standard pattern for any *.myworkdayjobs.com firm.
    search_url: "https://pinnaclegroup.wd1.myworkdayjobs.com/en-US/PinnacleGroup"
    api:
      method: POST
      url: "https://pinnaclegroup.wd1.myworkdayjobs.com/wday/cxs/pinnaclegroup/PinnacleGroup/jobs"
      headers: { Content-Type: "application/json", Accept: "application/json" }
      json_body: { appliedFacets: {}, limit: 20, offset: 0, searchText: "data" }
      paginate: { in: json_body, param: offset, size: 20, max_pages: 3 }
      list_path: "jobPostings"
      url_prefix: "https://pinnaclegroup.wd1.myworkdayjobs.com/en-US/PinnacleGroup"
      fields:
        title: "title"
        location: "locationsText"
        url: "externalPath"
        posted: "postedOn"
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

  - name: "KellyMitchell"
    mode: api
    search_url: "https://www.careers.kellymitchell.com/jobs"
    api:
      method: POST
      url: "https://www.careers.kellymitchell.com/_sf/api/v1/jobs/search.json"
      headers: { Content-Type: "application/json", Accept: "application/json" }
      json_body:
        job_search:
          query: "data"
          location: { address: "", radius: 50, region: "US", radius_units: "miles" }
          filters: {}
          commute_filter: {}
          offset: 0
      list_path: "results"
      url_prefix: "https://www.careers.kellymitchell.com/jobs"
      fields:
        title: "job.title"
        location: "job.original_location"
        url: "job.url_slug"
        posted: "job.published_at"
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

  # ---- WP Job Manager (HTML-in-JSON) ----
  - name: "Gina's Tech Jobs"
    mode: api_html
    search_url: "https://www.ginastechjobs.com/find-it-jobs/"
    api:
      method: POST
      url: "https://www.ginastechjobs.com/jm-ajax/get_listings/"
      headers: { Content-Type: "application/x-www-form-urlencoded; charset=UTF-8" }
      form: { search_keywords: "data", per_page: 30, orderby: "date", order: "DESC", page: 1 }
      html_field: "html"
    selectors:
      card: "li.job_listing"
      title: "h3"
      location: ".location"
      link: "a"
    location_filter: ["United States", "USA", "OH", "Ohio", "Cincinnati", "Remote", ""]

