  - name: "Njoyn (CGI)"
    mode: html
    search_url: "https://cgi.njoyn.com/CORP/xweb/xweb.asp?page=joblisting&CLID=21001"
    detail_date: true   # real datePosted only on the detail page
    url: "https://cgi.njoyn.com/CORP/xweb/xweb.asp?page=joblisting&CLID=21001"
    url_prefix: "https://cgi.njoyn.com/CORP/xweb/"
    selectors:
      card: "tr:has(a[href*=JobDetails])"
      title: "td:nth-of-type(2)"
      location: ["td:nth-of-type(4)", "td:nth-of-type(5)"]   # city, country
      link: "a[href*=JobDetails]"
